{% extends "layouts/base.html" %}
{% block title %}Thêm nhân viên — Tiền lương{% endblock %}
{% block page_title %}Thêm nhân viên{% endblock %}
{% block breadcrumb %}
<li class="breadcrumb-item"><a href="{{ url_for('main.dashboard') }}">Trang chủ</a></li>
<li class="breadcrumb-item"><a href="{{ url_for('payroll.employees') }}">Nhân viên</a></li>
<li class="breadcrumb-item active">Thêm mới</li>
{% endblock %}
{% block content %}
<div class="card">
    <div class="card-header py-2"><i class="fas fa-user-plus me-1"></i>Thêm nhân viên</div>
    <div class="card-body">
        <form method="POST">
            <div class="row g-3">
                <div class="col-md-3">
                    <label class="form-label">Mã NV <span class="text-danger">*</span></label>
                    <input type="text" name="employee_code" class="form-control" required>
                </div>
                <div class="col-md-5">
                    <label class="form-label">Họ và tên <span class="text-danger">*</span></label>
                    <input type="text" name="full_name" class="form-control" required>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Mã số thuế CN</label>
                    <input type="text" name="tax_code" class="form-control">
                </div>
                <div class="col-md-3">
                    <label class="form-label">Ngày sinh</label>
                    <input type="date" name="date_of_birth" class="form-control">
                </div>
                <div class="col-md-3">
                    <label class="form-label">Số CMND/CCCD</label>
                    <input type="text" name="id_number" class="form-control">
                </div>
                <div class="col-md-3">
                    <label class="form-label">Ngày tuyển dụng <span class="text-danger">*</span></label>
                    <input type="date" name="hire_date" class="form-control" value="{{ today }}" required>
                </div>
                <div class="col-md-3">
                    <label class="form-label">Phòng ban</label>
                    <input type="text" name="department" class="form-control">
                </div>
                <div class="col-md-3">
                    <label class="form-label">Chức vụ</label>
                    <input type="text" name="position" class="form-control">
                </div>
                <div class="col-md-3">
                    <label class="form-label">Loại hợp đồng</label>
                    <select name="contract_type" class="form-select">
                        <option value="indefinite">Không xác định</option>
                        <option value="fixed_12">Xác định 12 tháng</option>
                        <option value="fixed_24">Xác định 24 tháng</option>
                        <option value="seasonal">Thời vụ</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <label class="form-label">Lương gross <span class="text-danger">*</span></label>
                    <input type="number" name="gross_salary" class="form-control" step="1000" required>
                </div>
                <div class="col-md-3">
                    <label class="form-label">Phụ cấp lương</label>
                    <input type="number" name="salary_allowance" class="form-control" value="0" step="1000">
                </div>
                <div class="col-md-3">
                    <label class="form-label">Lương đóng BH</label>
                    <input type="number" name="insurance_salary" class="form-control" step="1000" placeholder="Bằng lương gross nếu để trống">
                </div>
                <div class="col-md-2">
                    <label class="form-label">Người phụ thuộc</label>
                    <input type="number" name="dependents" class="form-control" value="0" min="0">
                </div>
                <div class="col-md-2">
                    <label class="form-label">&nbsp;</label>
                    <div class="form-check mt-2"><input type="checkbox" name="is_insured" class="form-check-input" checked><label class="form-check-label">Đóng BH</label></div>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Số tài khoản ngân hàng</label>
                    <input type="text" name="bank_account" class="form-control">
                </div>
                <div class="col-md-4">
                    <label class="form-label">Tên ngân hàng</label>
                    <input type="text" name="bank_name" class="form-control">
                </div>
                <div class="col-md-4">
                    <label class="form-label">Email</label>
                    <input type="email" name="email" class="form-control">
                </div>
                <div class="col-md-4">
                    <label class="form-label">Điện thoại</label>
                    <input type="text" name="phone" class="form-control">
                </div>
                <div class="col-md-8">
                    <label class="form-label">Địa chỉ</label>
                    <input type="text" name="address" class="form-control">
                </div>
            </div>
            <div class="d-flex justify-content-end gap-2 mt-3">
                <a href="{{ url_for('payroll.employees') }}" class="btn btn-secondary">Hủy</a>
                <button type="submit" class="btn btn-primary"><i class="fas fa-save me-1"></i>Lưu</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
