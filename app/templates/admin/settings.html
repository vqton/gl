{% extends "layouts/base.html" %}
{% block title %}Cài đặt — Quản trị{% endblock %}
{% block page_title %}Cài đặt hệ thống{% endblock %}
{% block breadcrumb %}
<li class="breadcrumb-item"><a href="{{ url_for('main.dashboard') }}">Trang chủ</a></li>
<li class="breadcrumb-item"><a href="{{ url_for('admin.index') }}">Quản trị</a></li>
<li class="breadcrumb-item active">Cài đặt</li>
{% endblock %}
{% block content %}
<div class="card">
    <div class="card-header py-2">
        <i class="fas fa-sliders-h me-1"></i>Thông tin doanh nghiệp
    </div>
    <div class="card-body">
        <form>
            <div class="row g-3">
                <div class="col-md-6">
                    <label for="company_name" class="form-label">Tên doanh nghiệp</label>
                    <input type="text" class="form-control form-control-sm" id="company_name" placeholder="Công ty TNHH ...">
                </div>
                <div class="col-md-3">
                    <label for="tax_code" class="form-label">Mã số thuế</label>
                    <input type="text" class="form-control form-control-sm" id="tax_code" maxlength="14">
                </div>
                <div class="col-md-3">
                    <label for="fiscal_year" class="form-label">Năm tài chính</label>
                    <select class="form-select form-select-sm" id="fiscal_year">
                        <option value="calendar">Năm dương lịch (01/01 - 31/12)</option>
                        <option value="custom">Năm tài chính khác</option>
                    </select>
                </div>
                <div class="col-md-6">
                    <label for="address" class="form-label">Địa chỉ</label>
                    <input type="text" class="form-control form-control-sm" id="address" placeholder="Số ... đường ... quận ... tỉnh ...">
                </div>
                <div class="col-md-3">
                    <label for="currency" class="form-label">Đơn vị tiền tệ</label>
                    <select class="form-select form-select-sm" id="currency">
                        <option value="VND" selected>VND — Việt Nam Đồng</option>
                        <option value="USD">USD — Đô la Mỹ</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <label for="accounting_standard" class="form-label">Chế độ kế toán</label>
                    <select class="form-select form-select-sm" id="accounting_standard">
                        <option value="tt99" selected>Thông tư 99/2025/TT-BTC</option>
                    </select>
                </div>
            </div>
            <div class="mt-3">
                <button type="submit" class="btn btn-sm btn-primary">
                    <i class="fas fa-save me-1"></i>Lưu cài đặt
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
