{% extends "layouts/base.html" %}
{% block title %}Thêm vật tư — Kho{% endblock %}
{% block page_title %}Thêm vật tư{% endblock %}
{% block breadcrumb %}
<li class="breadcrumb-item"><a href="{{ url_for('main.dashboard') }}">Trang chủ</a></li>
<li class="breadcrumb-item"><a href="{{ url_for('inventory.items') }}">Vật tư</a></li>
<li class="breadcrumb-item active">Thêm mới</li>
{% endblock %}
{% block content %}
<div class="card">
    <div class="card-header py-2"><i class="fas fa-plus me-1"></i>Thêm vật tư</div>
    <div class="card-body">
        <form method="POST">
            <div class="row g-3">
                <div class="col-md-3"><label class="form-label">Mã VT <span class="text-danger">*</span></label><input type="text" name="item_code" class="form-control" required></div>
                <div class="col-md-5"><label class="form-label">Tên vật tư <span class="text-danger">*</span></label><input type="text" name="item_name" class="form-control" required></div>
                <div class="col-md-4"><label class="form-label">Nhóm</label><select name="category" class="form-select"><option value="nguyen-lieu">Nguyên liệu</option><option value="cong-cu">Công cụ, dụng cụ</option><option value="hang-hoa">Hàng hóa</option><option value="san-pham">Sản phẩm</option></select></div>
                <div class="col-md-2"><label class="form-label">ĐVT <span class="text-danger">*</span></label><input type="text" name="unit" class="form-control" placeholder="cái, kg..." required></div>
                <div class="col-md-2"><label class="form-label">Tồn kho đầu kỳ</label><input type="number" name="quantity" class="form-control" value="0" min="0" step="0.01"></div>
                <div class="col-md-3"><label class="form-label">Đơn giá</label><input type="number" name="unit_cost" class="form-control" value="0" min="0" step="0.01"></div>
                <div class="col-md-3"><label class="form-label">Định mức tối thiểu</label><input type="number" name="min_quantity" class="form-control" value="0" min="0" step="0.01"></div>
                <div class="col-md-3"><label class="form-label">Phương pháp tính giá</label><select name="valuation_method" class="form-select"><option value="fifo">FIFO</option><option value="weighted_avg">Bình quân gia quyền</option></select></div>
            </div>
            <div class="d-flex justify-content-end gap-2 mt-3">
                <a href="{{ url_for('inventory.items') }}" class="btn btn-secondary">Hủy</a>
                <button type="submit" class="btn btn-primary"><i class="fas fa-save me-1"></i>Lưu</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
