{% extends "base.html" %}

{% block title %}Cấu hình hệ thống{% endblock %}

{% block content %}
<div class="page-header">
    <div>
        <h2>Cấu hình hệ thống</h2>
        <p class="page-desc">Cấu hình thuế, tiền tệ và tỷ giá mặc định</p>
    </div>
</div>

<div class="card">
    <div class="card-header">Thuế và tiền tệ</div>
    <div class="card-body">
        <form method="post">
            {% csrf_token %}
            <h5 class="mb-3">Tiền tệ</h5>
            <div class="row">
                <div class="col-md-4 mb-3">
                    <label class="form-label">Tiền tệ mặc định</label>
                    <input type="text" name="tien_te_mac_dinh" class="form-control"
                           value="{{ config.tien_te_mac_dinh }}">
                </div>
                <div class="col-md-4 mb-3">
                    <label class="form-label">Tỷ giá</label>
                    <input type="text" name="ty_gia" class="form-control"
                           value="{{ config.ty_gia }}">
                </div>
            </div>
            <hr>
            <h5 class="mb-3">Thuế TNDN</h5>
            <div class="row">
                <div class="col-md-4 mb-3">
                    <label class="form-label">Thuế TNDN SME (%)</label>
                    <input type="text" name="thue_tndn_15" class="form-control"
                           value="{{ config.thue_tndn_15 }}">
                </div>
                <div class="col-md-4 mb-3">
                    <label class="form-label">Thuế TNDN chuẩn (%)</label>
                    <input type="text" name="thue_tndn_20" class="form-control"
                           value="{{ config.thue_tndn_20 }}">
                </div>
            </div>
            <hr>
            <h5 class="mb-3">Thuế GTGT (VAT)</h5>
            <div class="row">
                <div class="col-md-3 mb-3">
                    <label class="form-label">VAT 0%</label>
                    <input type="text" name="thue_vat_0" class="form-control"
                           value="{{ config.thue_vat_0 }}" readonly>
                </div>
                <div class="col-md-3 mb-3">
                    <label class="form-label">VAT 5%</label>
                    <input type="text" name="thue_vat_5" class="form-control"
                           value="{{ config.thue_vat_5 }}" readonly>
                </div>
                <div class="col-md-3 mb-3">
                    <label class="form-label">VAT 8%</label>
                    <input type="text" name="thue_vat_8" class="form-control"
                           value="{{ config.thue_vat_8 }}" readonly>
                </div>
                <div class="col-md-3 mb-3">
                    <label class="form-label">VAT 10%</label>
                    <input type="text" name="thue_vat_10" class="form-control"
                           value="{{ config.thue_vat_10 }}" readonly>
                </div>
            </div>
            <div class="mt-3">
                <button type="submit" class="btn btn-primary">Lưu cấu hình</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
