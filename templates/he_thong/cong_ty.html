{% extends "base.html" %}

{% block title %}Thông tin công ty - Hệ thống{% endblock %}

{% block content %}
<div class="page-header">
    <div>
        <h2>Thông tin công ty</h2>
        <p class="page-desc">Cấu hình thông tin doanh nghiệp theo TT 99/2025/TT-BTC</p>
    </div>
</div>

<div class="card">
    <div class="card-header">Thông tin chung</div>
    <div class="card-body">
        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Tên công ty <span class="text-danger">*</span></label>
                    <input type="text" name="ten_cong_ty" class="form-control"
                           value="{{ company.ten_cong_ty }}" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Mã số thuế <span class="text-danger">*</span></label>
                    <input type="text" name="ma_so_thue" class="form-control"
                           value="{{ company.ma_so_thue }}" required>
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label">Địa chỉ</label>
                <textarea name="dia_chi" class="form-control" rows="2">{{ company.dia_chi }}</textarea>
            </div>
            <div class="row">
                <div class="col-md-4 mb-3">
                    <label class="form-label">Điện thoại</label>
                    <input type="text" name="dien_thoai" class="form-control"
                           value="{{ company.dien_thoai }}">
                </div>
                <div class="col-md-4 mb-3">
                    <label class="form-label">Email</label>
                    <input type="email" name="email" class="form-control"
                           value="{{ company.email }}">
                </div>
                <div class="col-md-4 mb-3">
                    <label class="form-label">Người đại diện</label>
                    <input type="text" name="nguoi_dai_dien" class="form-control"
                           value="{{ company.nguoi_dai_dien }}">
                </div>
            </div>
            <div class="row">
                <div class="col-md-4 mb-3">
                    <label class="form-label">Chức vụ người đại diện</label>
                    <input type="text" name="chuc_vu_ndd" class="form-control"
                           value="{{ company.chuc_vu_ndd }}">
                </div>
                <div class="col-md-4 mb-3">
                    <label class="form-label">Kế toán trưởng</label>
                    <input type="text" name="ke_toan_truong" class="form-control"
                           value="{{ company.ke_toan_truong }}">
                </div>
            </div>
            <hr>
            <h5 class="mb-3">Cấu hình kế toán</h5>
            <div class="row">
                <div class="col-md-4 mb-3">
                    <label class="form-label">Hình thức kế toán</label>
                    <select name="hinh_thuc_ke_toan" class="form-select">
                        <option value="nhat_ky_chung" {% if company.hinh_thuc_ke_toan == "nhat_ky_chung" %}selected{% endif %}>Nhật ký chung</option>
                        <option value="nhat_ky_so_cai" {% if company.hinh_thuc_ke_toan == "nhat_ky_so_cai" %}selected{% endif %}>Nhật ký - Sổ cái</option>
                        <option value="chung_tu_ghi_so" {% if company.hinh_thuc_ke_toan == "chung_tu_ghi_so" %}selected{% endif %}>Chứng từ ghi sổ</option>
                        <option value="nhat_ky_chung_tu" {% if company.hinh_thuc_ke_toan == "nhat_ky_chung_tu" %}selected{% endif %}>Nhật ký chứng từ</option>
                    </select>
                </div>
                <div class="col-md-4 mb-3">
                    <label class="form-label">Phương pháp GTGT</label>
                    <select name="phuong_phap_gtgt" class="form-select">
                        <option value="khau_tru" {% if company.phuong_phap_gtgt == "khau_tru" %}selected{% endif %}>Khấu trừ</option>
                        <option value="truc_tiep" {% if company.phuong_phap_gtgt == "truc_tiep" %}selected{% endif %}>Trực tiếp</option>
                    </select>
                </div>
                <div class="col-md-4 mb-3">
                    <label class="form-label">Phương pháp tồn kho</label>
                    <select name="phuong_phap_ton_kho" class="form-select">
                        <option value="nhap_truoc_xuat_truoc" {% if company.phuong_phap_ton_kho == "nhap_truoc_xuat_truoc" %}selected{% endif %}>FIFO</option>
                        <option value="nhap_sau_xuat_truoc" {% if company.phuong_phap_ton_kho == "nhap_sau_xuat_truoc" %}selected{% endif %}>LIFO</option>
                        <option value="binh_quan_lien_hoan" {% if company.phuong_phap_ton_kho == "binh_quan_lien_hoan" %}selected{% endif %}>Bình quân liên hoàn</option>
                        <option value="binh_quan_cuoi_ky" {% if company.phuong_phap_ton_kho == "binh_quan_cuoi_ky" %}selected{% endif %}>Bình quân cuối kỳ</option>
                        <option value="thuc_te_lich_trinh" {% if company.phuong_phap_ton_kho == "thuc_te_lich_trinh" %}selected{% endif %}>Thực tế đích danh</option>
                    </select>
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label">Logo</label>
                {% if company.logo %}
                <div class="mb-2"><img src="{{ company.logo.url }}" alt="Logo" style="max-height:80px;"></div>
                {% endif %}
                <input type="file" name="logo" class="form-control" accept="image/*">
            </div>
            <div class="mt-3">
                <button type="submit" class="btn btn-primary">Lưu thông tin</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
