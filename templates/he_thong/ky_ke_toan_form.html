{% extends "base.html" %}

{% block title %}Thêm kỳ kế toán - Hệ thống{% endblock %}

{% block content %}
<div class="page-header">
    <div>
        <h2>Thêm kỳ kế toán mới</h2>
    </div>
</div>

<div class="card">
    <div class="card-body">
        <form method="post">
            {% csrf_token %}
            <div class="row">
                <div class="col-md-4 mb-3">
                    <label class="form-label">Năm <span class="text-danger">*</span></label>
                    <input type="number" name="nam" class="form-control" required min="2000" max="2100">
                </div>
                <div class="col-md-4 mb-3">
                    <label class="form-label">Ngày bắt đầu <span class="text-danger">*</span></label>
                    <input type="date" name="ngay_bat_dau" class="form-control" required>
                </div>
                <div class="col-md-4 mb-3">
                    <label class="form-label">Ngày kết thúc <span class="text-danger">*</span></label>
                    <input type="date" name="ngay_ket_thuc" class="form-control" required>
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label">Trạng thái</label>
                <select name="trang_thai" class="form-select">
                    <option value="open">Mở</option>
                    <option value="locked">Khóa</option>
                    <option value="closed">Đóng</option>
                </select>
            </div>
            <button type="submit" class="btn btn-primary">Tạo kỳ</button>
            <a href="{% url 'he_thong:ky_ke_toan_list' %}" class="btn btn-outline-secondary">Quay lại</a>
        </form>
    </div>
</div>
{% endblock %}
