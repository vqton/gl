{% extends "base.html" %}
{% block content %}
<div class="container-fluid">
    <h2 class="mb-4">Giấy đề nghị tạm ứng (03-TT)</h2>
    <form method="post" class="row g-3">
        {% csrf_token %}
        {% for field in form %}
        <div class="col-md-6">
            <label class="form-label">{{ field.label }}</label>
            {{ field }}
            {% if field.errors %}
            <div class="text-danger small">{{ field.errors }}</div>
            {% endif %}
        </div>
        {% endfor %}
        <div class="col-12">
            <button type="submit" class="btn btn-primary">Lưu</button>
            <a href="{% url 'nghiep_vu:giay_tam_ung_list' %}" class="btn btn-secondary">Hủy</a>
        </div>
    </form>
</div>
{% endblock %}
