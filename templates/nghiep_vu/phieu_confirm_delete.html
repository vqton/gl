{% extends "base.html" %}
{% block title %}Xóa chứng từ{% endblock %}
{% block breadcrumb %}Nghiệp vụ / Xóa{% endblock %}
{% block content %}
<div class="page-header">
    <h2>Xác nhận xóa</h2>
</div>
    <div class="alert alert-danger">
        <p>Bạn có chắc chắn muốn xóa <strong>{{ object.so_chung_tu }}</strong>?</p>
        <p class="mb-0">Hành động này không thể hoàn tác.</p>
    </div>
    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Xóa</button>
        <a href="javascript:history.back()" class="btn btn-secondary ms-2">Hủy</a>
    </form>
</div>
{% endblock %}
