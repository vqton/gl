[pytest]
DJANGO_SETTINGS_MODULE = core.settings.dev
python_files = tests.py test_*.py *_tests.py
python_classes = Test*
python_functions = test_*
addopts =
    --cov=apps
    --cov-report=html
    --cov-report=term
    --strict-markers
    -v
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests
